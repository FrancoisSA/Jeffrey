{% extends "base.html" %}
{% block title %}Journal{% endblock %}

{% block content %}
<div class="container mx-auto px-4 max-w-3xl">

    <!-- Retour + titre -->
    <div class="flex items-center gap-3 mb-6">
        <a href="/" class="text-indigo-500 hover:text-indigo-700 text-sm font-medium">← Retour</a>
        <h2 class="text-xl font-semibold text-gray-800">💬 Journal des demandes</h2>
        <span id="journal-spinner" class="spinner ml-auto"></span>
    </div>

    <!-- Liste des échanges -->
    <div id="journal-list">
        <div class="text-center text-gray-400 py-12">Chargement...</div>
    </div>

    <!-- Pagination -->
    <div class="flex justify-between items-center mt-6 text-sm text-gray-500" id="pagination">
        <button onclick="goTo(currentOffset - LIMIT)"
                id="btn-prev"
                class="px-4 py-2 rounded-lg bg-white border hover:border-indigo-400 hover:text-indigo-600 transition disabled:opacity-30"
                disabled>← Précédent</button>
        <span id="page-info">—</span>
        <button onclick="goTo(currentOffset + LIMIT)"
                id="btn-next"
                class="px-4 py-2 rounded-lg bg-white border hover:border-indigo-400 hover:text-indigo-600 transition disabled:opacity-30"
                disabled>Suivant →</button>
    </div>

</div>

<script>
const LIMIT = 25;
let currentOffset = 0;

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadPage(offset) {
    document.getElementById('journal-spinner').style.display = 'inline-block';
    currentOffset = offset;
    try {
        const res  = await fetch(`/api/journal?limit=${LIMIT}&offset=${offset}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        render(data);
    } catch(e) {
        document.getElementById('journal-list').innerHTML =
            `<p class="text-red-500 py-6 text-center">Erreur : ${escHtml(e.message)}</p>`;
    } finally {
        document.getElementById('journal-spinner').style.display = 'none';
    }
}

function render({ exchanges, total, limit, offset }) {
    const container = document.getElementById('journal-list');

    if (!exchanges.length) {
        container.innerHTML = '<p class="text-gray-400 py-12 text-center">Aucun échange enregistré.</p>';
        updatePagination(0, 0, 0);
        return;
    }

    const html = exchanges.map(ex => {
        const icon = ex.message_type === 'voice' ? '🎤' : '💬';
        return `
            <div class="bg-white rounded-xl shadow mb-4 p-4">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-gray-400">${icon} ${escHtml(ex.timestamp_display)}</span>
                    ${ex.duration_ms ? `<span class="text-xs text-gray-300 bg-gray-50 px-2 py-0.5 rounded-full">${ex.duration_ms} ms</span>` : ''}
                </div>
                <!-- Message utilisateur -->
                <div class="bg-indigo-50 rounded-lg px-4 py-2.5 text-sm text-gray-800 mb-2">
                    <p class="text-xs font-semibold text-indigo-500 mb-1">Vous</p>
                    ${escHtml(ex.user_message)}
                </div>
                <!-- Réponse Jeffrey -->
                <div class="bg-gray-50 rounded-lg px-4 py-2.5 text-sm text-gray-600">
                    <p class="text-xs font-semibold text-gray-400 mb-1">Jeffrey</p>
                    ${escHtml(ex.jeffrey_reply)}
                </div>
            </div>
        `;
    }).join('');

    container.innerHTML = html;
    updatePagination(total, limit, offset);
}

function updatePagination(total, limit, offset) {
    const page  = Math.floor(offset / limit) + 1;
    const pages = Math.ceil(total / limit) || 1;
    document.getElementById('page-info').textContent = `Page ${page} / ${pages}  (${total} échanges)`;
    document.getElementById('btn-prev').disabled = offset <= 0;
    document.getElementById('btn-next').disabled = offset + limit >= total;
}

function goTo(offset) {
    if (offset < 0) return;
    loadPage(offset);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadPage(0);
</script>
{% endblock %}
